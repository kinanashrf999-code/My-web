<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | النظام الشامل</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #349ae9; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0d1b2a; color: white; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(10, 25, 47, 0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-links a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; cursor: pointer; }
        .section { display: none; padding: 120px 5% 50px; text-align: center; }
        .active { display: block; }
        .hero-title { font-size: 4rem; font-weight: 900; color: var(--accent); }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin: 10px auto; max-width: 900px; text-align: right; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 30px 0; }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid var(--accent); }
        .btn { background: linear-gradient(135deg, #113a6b, #249ae9); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.4); border: 1px solid #1b4965; color: white; border-radius: 10px; text-align: right; }
        .user-circle { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem; color: var(--accent);">IDEAL TOWN</div>
        <div class="nav-links">
            <a onclick="showSection('home')">الرئيسية</a>
            <a onclick="showSection('store')">المتجر</a>
            <a onclick="showSection('laws-page')">القوانين</a>
            <a onclick="showSection('apply-hub')">التقديمات</a>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div class="user-circle" id="login-btn" onclick="loginWithDiscord()">
                <i class="fas fa-user-plus" id="user-icon"></i>
                <img id="user-avatar" style="display:none; width:100%;">
            </div>
            <button class="btn" onclick="showAdminModal()">الإدارة</button>
        </div>
    </nav>

    <div id="home" class="section active">
        <h1 class="hero-title">IDEAL TOWN</h1>
        <div class="stats-grid">
            <div class="stat-card"><h2 id="total-reg">0</h2><p>عضو مسجل</p></div>
            <div class="stat-card"><h2 id="online-now">0</h2><p>لاعب متصل</p></div>
            <div class="stat-card"><h2 id="scripts-count">0</h2><p>سكربت حصري</p></div>
            <div class="stat-card"><h2 id="srv-status">...</h2><p>حالة السيرفر</p></div>
        </div>
        <a id="dc-link" href="#" class="btn" style="background:#5865F2">دخول الديسكورد</a>
    </div>

    <div id="laws-page" class="section">
        <h1>قوانين المدينة</h1>
        <div id="laws-cats" style="margin-bottom:20px;"></div>
        <div class="card" id="laws-content">اختر قسم القوانين...</div>
    </div>

    <div id="apply-hub" class="section">
        <h1>مركز التقديمات</h1>
        <div id="apply-btns" style="margin-top:20px;">
            <button class="btn" onclick="openApply('إدارة')">تقديم إدارة</button>
            <button class="btn" onclick="openApply('شرطة')">تقديم شرطة</button>
            <button class="btn" onclick="openApply('إسعاف')">تقديم إسعاف</button>
        </div>
        <div id="apply-form" class="card" style="display:none; margin-top:20px;">
            <h3 id="apply-title"></h3>
            <input type="text" id="ap-name" placeholder="الاسم الكامل">
            <input type="number" id="ap-age" placeholder="العمر">
            <textarea id="ap-exp" placeholder="خبراتك السابقة"></textarea>
            <button class="btn" onclick="submitApply()">إرسال الطلب</button>
        </div>
    </div>

    <div id="admin-panel" class="section">
        <h1>لوحة تحكم الإدارة</h1>
        <div class="card">
            <h3>إحصائيات السيرفر</h3>
            <input type="number" id="set-online" placeholder="اللاعبين المتصلين">
            <input type="number" id="set-scripts" placeholder="عدد السكربتات">
            <select id="set-status"><option value="متصل 🟢">متصل</option><option value="صيانة 🟠">صيانة</option></select>
            <input type="text" id="set-dc" placeholder="رابط الديسكورد">
            <button class="btn" onclick="saveStats()">حفظ الإحصائيات</button>
        </div>
        <div class="card">
            <h3>إضافة/تعديل قوانين</h3>
            <input type="text" id="law-cat" placeholder="الفئة (مثال: قوانين عامة)">
            <input type="text" id="law-title" placeholder="عنوان القانون">
            <textarea id="law-text" placeholder="نص القانون"></textarea>
            <button class="btn" onclick="addLaw()">حفظ القانون</button>
            <div id="admin-laws-list"></div>
        </div>
    </div>

    <div id="adminModal" style="display:none;" class="card">
        <h2>دخول الإدارة</h2>
        <input type="password" id="admin-pass" placeholder="الرمز">
        <button class="btn" onclick="checkAdmin()">دخول</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCej9aIee1xn8TsHzrBR7IEbHL7uI-xJ6k", databaseURL: "https://ideal-town-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const WEBHOOK = "https://discord.com/api/webhooks/1490340481672937749/i7Bp6IuN3D2a0DLxSCbXyecW09fRgeHzuXbH74ig8P5VIgkDyiSSeTHK0VDa3553quCT";

        let currentUser = JSON.parse(localStorage.getItem('user'));

        function loginWithDiscord() {
            const clientID = "1490563807834275972";
            const redirect = encodeURIComponent(window.location.href.split('#')[0]);
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${clientID}&redirect_uri=${redirect}&response_type=token&scope=identify`;
        }

        window.onload = () => {
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            if (fragment.has('access_token')) {
                fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${fragment.get('access_token')}` } })
                .then(res => res.json()).then(user => {
                    localStorage.setItem('user', JSON.stringify(user));
                    db.ref('users/' + user.id).set(user);
                    location.hash = ""; location.reload();
                });
            }
            if(currentUser) {
                document.getElementById('user-icon').style.display='none';
                document.getElementById('user-avatar').style.display='block';
                document.getElementById('user-avatar').src = `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png`;
            }
            loadData();
        };

        function loadData() {
            db.ref('settings').on('value', s => {
                const d = s.val() || {};
                document.getElementById('online-now').innerText = d.online || 0;
                document.getElementById('scripts-count').innerText = d.scripts || 0;
                document.getElementById('srv-status').innerText = d.status || "متصل 🟢";
                document.getElementById('dc-link').href = d.dc_link || "#";
            });
            db.ref('users').on('value', s => { document.getElementById('total-reg').innerText = s.numChildren(); });
            db.ref('laws').on('value', s => {
                const laws = s.val();
                const catsDiv = document.getElementById('laws-cats');
                catsDiv.innerHTML = "";
                const uniqueCats = [...new Set(Object.values(laws || {}).map(l => l.cat))];
                uniqueCats.forEach(c => {
                    catsDiv.innerHTML += `<button class="btn" onclick="viewLawCat('${c}')">${c}</button> `;
                });
            });
        }

        function viewLawCat(cat) {
            db.ref('laws').once('value', s => {
                const laws = s.val();
                let html = `<h2>${cat}</h2>`;
                for(let id in laws) if(laws[id].cat === cat) html += `<div class="card"><h4>${laws[id].title}</h4><p>${laws[id].text}</p></div>`;
                document.getElementById('laws-content').innerHTML = html;
            });
        }

        function saveStats() {
            db.ref('settings').update({ 
                online: document.getElementById('set-online').value,
                scripts: document.getElementById('set-scripts').value,
                status: document.getElementById('set-status').value,
                dc_link: document.getElementById('set-dc').value
            });
            alert("تم الحفظ");
        }

        function addLaw() {
            db.ref('laws').push({
                cat: document.getElementById('law-cat').value,
                title: document.getElementById('law-title').value,
                text: document.getElementById('law-text').value
            });
            alert("تم إضافة القانون");
        }

        async function submitApply() {
            const data = {
                content: `📝 **تقديم جديد: ${document.getElementById('apply-title').innerText}**\n👤 المتقدم: <@${currentUser.id}>\n📛 الاسم: ${document.getElementById('ap-name').value}\n🎂 العمر: ${document.getElementById('ap-age').value}\n📜 الخبرات: ${document.getElementById('ap-exp').value}`
            };
            await fetch(WEBHOOK, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            alert("تم الإرسال!");
        }

        function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function showAdminModal() { document.getElementById('adminModal').style.display='block'; }
        function checkAdmin() { if(document.getElementById('admin-pass').value === "663567M") showSection('admin-panel'); }
        function openApply(t) { if(!currentUser) return alert("سجل دخولك!"); document.getElementById('apply-title').innerText = t; document.getElementById('apply-form').style.display='block'; }
    </script>
</body>
</html>
