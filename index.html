<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dark-blue: #0a192f; 
            --btn-blue: linear-gradient(135.5deg, rgb(17, 58, 107) 0%, rgb(36, 154, 233) 100%);
            --white: #ffffff; 
            --glass: rgba(255, 255, 255, 0.05); 
            --accent: #349ae9;
            --online: #22c55e;
            --offline: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0d1b2a; color: var(--white); min-height: 100vh; }
        
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-links a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .section { display: none; padding: 120px 5% 50px; text-align: center; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn { background: var(--btn-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 0.9rem; margin: 2px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-success { background: #22c55e; }
        .btn-danger { background: #ef4444; }
        .btn-info { background: #3b82f6; }

        .card { background: var(--glass); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin: 20px auto; max-width: 900px; text-align: right; }
        
        /* Dashboard Cards */
        .admin-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); padding: 20px; margin-top: 15px; border-radius: 12px; border-right: 5px solid var(--accent); text-align: right; position: relative; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; }
        .pending { background: #f59e0b; color: #000; }
        .accepted { background: #22c55e; color: #fff; }
        .rejected { background: #ef4444; color: #fff; }
        .delivered { background: #3b82f6; color: #fff; }

        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.6); border: 1px solid #1b4965; color: white; border-radius: 8px; text-align: right; }
        
        #login-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; }
        
        /* Store grid from previous version */
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 30px; padding: 0 5%; }
        .product-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 25px; overflow: hidden; position: relative; max-width: 450px; margin: auto; transition: 0.4s ease; }
        .img-container { position: relative; width: 100%; padding-top: 70%; }
        .product-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-weight: 900; font-size: 1.5rem; color: var(--accent);">IDEAL TOWN</span>
        </div>
        <div class="nav-links">
            <a onclick="showSection('home')">الرئيسية</a>
            <a onclick="showSection('store')">المتجر</a>
            <a onclick="showSection('laws')">القوانين</a>
            <a onclick="showSection('police-hub')">الشرطة</a>
            <a onclick="showSection('apply-admin')">تقديم الإدارة</a>
        </div>
        <button class="btn" onclick="document.getElementById('login-modal').style.display='flex'">لوحة التحكم</button>
    </nav>

    <div id="login-modal">
        <div class="card" style="width: 350px; text-align: center;">
            <h3>تسجيل الدخول للإدارة</h3>
            <input type="text" id="user-input" placeholder="اسم المستخدم">
            <input type="password" id="pass-input" placeholder="الرمز">
            <button class="btn" onclick="handleLogin()" style="width: 100%;">دخول</button>
            <button class="btn" onclick="document.getElementById('login-modal').style.display='none'" style="background:none;">إغاء</button>
        </div>
    </div>

    <div id="home" class="section active">
        <h1 class="hero-title">IDEAL TOWN</h1>
        <div class="card" style="max-width: 400px; margin: auto;">
            <h3 id="display-online">0</h3><p>لاعب متصل الآن</p>
        </div>
    </div>

    <div id="store" class="section">
        <h1>المتجر</h1>
        <div id="store-container" class="store-grid"></div>
    </div>

    <div id="admin-panel" class="section">
        <h1>لوحة تحكم الإدارة</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
            
            <div class="card" style="margin:0">
                <h2 style="color: var(--accent);"><i class="fas fa-users-cog"></i> طلبات التوظيف</h2>
                <div id="all-apps"></div>
            </div>

            <div class="card" style="margin:0">
                <h2 style="color: var(--accent);"><i class="fas fa-shopping-cart"></i> طلبات المتجر</h2>
                <div id="order-requests"></div>
            </div>

            <div class="card" style="margin:0; grid-column: 1 / -1;">
                <h2>إدارة المحتوى</h2>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="prod-img" placeholder="رابط صورة المنتج">
                    <input type="text" id="prod-title" placeholder="اسم المنتج">
                    <input type="text" id="prod-price" placeholder="السعر">
                    <button class="btn" onclick="addNewProduct()">إضافة للمتجر</button>
                </div>
            </div>
        </div>
    </div>

    <div id="police-hub" class="section"><h1>قسم الشرطة</h1><button class="btn" onclick="showSection('police-apply')">تقديم</button></div>
    <div id="police-apply" class="section">
        <div class="card">
            <h3>تقديم للشرطة</h3>
            <form id="policeForm">
                <input type="text" name="name" placeholder="الاسم الكامل" required>
                <input type="number" name="age" placeholder="العمر" required>
                <input type="text" name="dc" placeholder="يوزر الديسكورد" required>
                <textarea name="exp" placeholder="الخبرات السابقة"></textarea>
                <select name="past"><option value="نعم">كنت عسكري سابقاً</option><option value="لا">لم أكن عسكرياً</option></select>
                <button type="submit" class="btn" style="width:100%">إرسال</button>
            </form>
        </div>
    </div>
    
    <div id="apply-admin" class="section">
        <div class="card">
            <h3>تقديم للإدارة</h3>
            <form id="adminForm">
                <input type="text" name="name" placeholder="الاسم الكامل" required>
                <input type="number" name="age" placeholder="العمر" required>
                <input type="text" name="dc" placeholder="يوزر الديسكورد" required>
                <textarea name="exp" placeholder="لماذا تريد الإدارة؟"></textarea>
                <select name="past"><option value="نعم">كنت إدارياً سابقاً</option><option value="لا">لم أكن إدارياً</option></select>
                <button type="submit" class="btn" style="width:100%">إرسال</button>
            </form>
        </div>
    </div>

    <script>
        // Firebase Config (Keep yours)
        const firebaseConfig = {
            apiKey: "AIzaSyCej9aIee1xn8TsHzrBR7IEbHL7uI-xJ6k",
            authDomain: "ideal-town.firebaseapp.com",
            databaseURL: "https://ideal-town-default-rtdb.firebaseio.com",
            projectId: "ideal-town",
            storageBucket: "ideal-town.firebasestorage.app",
            messagingSenderId: "505860972539",
            appId: "1:505860972539:web:30e3455476674bd45eb55e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleLogin() {
            if(document.getElementById('user-input').value === "IDL TOWN MANAGEMENT" && document.getElementById('pass-input').value === "663567M") {
                document.getElementById('login-modal').style.display = 'none';
                showSection('admin-panel');
            } else { alert("خطأ!"); }
        }

        // Logic for Employment Apps (Accept/Reject/Delete)
        db.ref('all_apps').on('value', s => {
            const d = s.val(); const div = document.getElementById('all-apps'); div.innerHTML = "";
            for(let id in d) {
                const app = d[id];
                const statusClass = app.status === 'مقبول' ? 'accepted' : (app.status === 'مرفوض' ? 'rejected' : 'pending');
                div.innerHTML += `
                <div class="admin-card">
                    <span class="status-badge ${statusClass}">${app.status || 'قيد الانتظار'}</span><br>
                    <b>النوع: ${app.type}</b><br>
                    الاسم: ${app.name} | العمر: ${app.age}<br>
                    الديسكورد: ${app.dc}<br>
                    <small>سابقاً: ${app.past}</small><br>
                    <div style="margin-top:10px;">
                        <button class="btn btn-success" onclick="updateAppStatus('${id}', 'مقبول')">قبول</button>
                        <button class="btn btn-danger" onclick="updateAppStatus('${id}', 'مرفوض')">رفض</button>
                        <button class="btn" style="background:gray;" onclick="deleteData('all_apps/${id}')">حذف</button>
                    </div>
                </div>`;
            }
        });

        // Logic for Store Orders (Deliver/Delete)
        db.ref('store_orders').on('value', s => {
            const d = s.val(); const div = document.getElementById('order-requests'); div.innerHTML = "";
            for(let id in d) {
                const order = d[id];
                const statusClass = order.status === 'تم التسليم' ? 'delivered' : 'pending';
                div.innerHTML += `
                <div class="admin-card">
                    <span class="status-badge ${statusClass}">${order.status || 'لم يتم التسليم'}</span><br>
                    📦 المنتج: <b>${order.product}</b><br>
                    👤 المشتري: ${order.user}<br>
                    <div style="margin-top:10px;">
                        <button class="btn btn-info" onclick="updateOrderStatus('${id}', 'تم التسليم')">تم التسليم</button>
                        <button class="btn btn-danger" onclick="deleteData('store_orders/${id}')">حذف</button>
                    </div>
                </div>`;
            }
        });

        // Firebase Update/Delete Functions
        function updateAppStatus(id, newStatus) { db.ref('all_apps/'+id).update({ status: newStatus }); }
        function updateOrderStatus(id, newStatus) { db.ref('store_orders/'+id).update({ status: newStatus }); }
        function deleteData(path) { if(confirm("هل أنت متأكد من الحذف؟")) db.ref(path).remove(); }

        // Store Logic
        function addNewProduct() {
            const img = document.getElementById('prod-img').value;
            const title = document.getElementById('prod-title').value;
            const price = document.getElementById('prod-price').value;
            if(title) db.ref('store_products').push({ img, title, price });
        }

        db.ref('store_products').on('value', s => {
            const data = s.val(); const div = document.getElementById('store-container'); div.innerHTML = "";
            for(let id in data) {
                const p = data[id];
                div.innerHTML += `<div class="product-card"><div class="img-container"><div class="price-tag">${p.price}</div><img src="${p.img}" class="product-img"></div><div class="product-info"><h3>${p.title}</h3><button class="btn" style="width:100%" onclick="buyProduct('${p.title}')">طلب شراء</button></div></div>`;
            }
        });

        function buyProduct(n) { const dc = prompt("يوزر ديسكوردك:"); if(dc) db.ref('store_orders').push({ product: n, user: dc, status: 'قيد الانتظار' }); }

        // Form Submit Listeners
        document.getElementById('policeForm').onsubmit = function(e){ e.preventDefault(); submitForm(this, 'شرطة'); };
        document.getElementById('adminForm').onsubmit = function(e){ e.preventDefault(); submitForm(this, 'إدارة'); };

        function submitForm(form, type) {
            const data = { type: type, name: form.name.value, age: form.age.value, dc: form.dc.value, exp: form.exp.value, past: form.past.value, status: 'قيد الانتظار' };
            db.ref('all_apps').push(data);
            alert("تم الإرسال!"); form.reset();
        }
    </script>
</body>
</html>
