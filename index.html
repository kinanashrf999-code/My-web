<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | FiveM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #ffcc00; --blue: #0a192f; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: radial-gradient(circle at top right, #112240, #0a192f); color: var(--white); min-height: 100vh; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; background: var(--glass); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 215, 0, 0.2); }
        .section { display: none; padding: 120px 8% 50px; text-align: center; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); flex: 1; min-width: 150px; }
        .stat-card h3 { color: var(--gold); font-size: 2.5rem; }
        .btn { background: var(--gold); color: black; border: none; padding: 10px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem; color: var(--gold);">IDEAL TOWN</div>
        <div style="display: flex; gap: 15px;">
            <a onclick="showSection('home')" style="cursor:pointer;">الرئيسية</a>
            <a onclick="showSection('apply')" style="cursor:pointer;">التقديم</a>
            <button class="btn" onclick="adminLogin()">الإدارة</button>
        </div>
    </nav>

    <div id="home" class="section active">
        <h1 style="font-size: 3.5rem;">IDEAL TOWN</h1>
        <p>عالم الواقعية والإثارة في FiveM</p>
        <div style="display: flex; gap: 20px; justify-content: center; margin-top: 40px; flex-wrap: wrap;">
            <div class="stat-card"><h3 id="live-online">0</h3><p>لاعب متصل</p></div>
            <div class="stat-card"><h3 id="live-reg">0</h3><p>عضو مسجل</p></div>
        </div>
    </div>

    <div id="apply" class="section">
        <div style="max-width: 400px; margin: auto; background: var(--glass); padding: 20px; border-radius: 15px;">
            <h2>طلب انضمام</h2>
            <form id="applyForm">
                <input type="text" id="name" placeholder="اسمك الثلاثي" required>
                <input type="text" id="dc" placeholder="يوزر الديسكورد" required>
                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <div id="admin" class="section">
        <h2>لوحة تحكم السيرفر</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div style="background: var(--glass); padding: 20px; border-radius: 15px;">
                <h3>تحديث الإحصائيات</h3>
                <input type="number" id="up-online" placeholder="عدد المتصلين">
                <input type="number" id="up-reg" placeholder="عدد المسجلين">
                <button class="btn" onclick="saveData()">تحديث الآن</button>
            </div>
            <div id="apps-list" style="background: var(--glass); padding: 20px; border-radius: 15px; text-align: right;">
                <h3>طلبات التقديم:</h3>
            </div>
        </div>
    </div>

    <script>
        // إعدادات Firebase الخاصة بك يا كنان
        const firebaseConfig = {
            apiKey: "AIzaSyCej9aIee1xn8TsHzrBR7IEbHL7uI-xJ6k",
            authDomain: "ideal-town.firebaseapp.com",
            databaseURL: "https://ideal-town-default-rtdb.firebaseio.com",
            projectId: "ideal-town",
            storageBucket: "ideal-town.firebasestorage.app",
            messagingSenderId: "505860972539",
            appId: "1:505860972539:web:30e3455476674bd45eb55e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function adminLogin() {
            let pass = prompt("أدخل كود الإدارة السري:");
            if(pass === "6635764M") showSection('admin');
            else alert("الكود خطأ!");
        }

        // جلب البيانات فوراً
        db.ref('stats').on('value', (s) => {
            const data = s.val();
            if(data) {
                document.getElementById('live-online').innerText = data.online || 0;
                document.getElementById('live-reg').innerText = data.reg || 0;
            }
        });

        function saveData() {
            db.ref('stats').set({
                online: document.getElementById('up-online').value,
                reg: document.getElementById('up-reg').value
            }).then(() => alert("تم التحديث!"));
        }

        document.getElementById('applyForm').onsubmit = function(e) {
            e.preventDefault();
            db.ref('apps').push({
                name: document.getElementById('name').value,
                dc: document.getElementById('dc').value
            }).then(() => { alert("تم إرسال طلبك!"); this.reset(); });
        };

        db.ref('apps').on('value', (s) => {
            const apps = s.val();
            const list = document.getElementById('apps-list');
            list.innerHTML = "<h3>طلبات التقديم:</h3>";
            for(let id in apps) {
                list.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; margin-top:5px; border-radius:5px;">
                    <p>الاسم: ${apps[id].name}</p>
                    <p>ديسكورد: ${apps[id].dc}</p>
                    <button onclick="db.ref('apps/${id}').remove()" style="color:red; background:none; border:none; cursor:pointer;">حذف</button>
                </div>`;
            }
        });
    </script>
</body>
</html>
