<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | الموقع الرسمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --main-bg: #0a192f;
            --accent-gold: #00a2ff;
            --glass: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --card-bg: rgba(16, 33, 65, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--main-bg);
            color: var(--text-white);
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #112240, #0a192f);
            min-height: 100vh;
            cursor: none; /* لإظهار الماوس المعدل فقط */
        }

        /* تأثير الماوس المتطور */
        .cursor-follower {
            position: fixed; width: 15px; height: 15px; background: var(--accent-gold);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 20px 5px var(--accent-gold); transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px); position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-img { height: 60px; cursor: pointer; transition: 0.3s; }
        nav ul { display: flex; list-style: none; gap: 25px; }
        nav ul li a { text-decoration: none; color: white; font-weight: 600; transition: 0.3s; }
        nav ul li a:hover { color: var(--accent-gold); }

        .btn-auth { background: var(--accent-gold); color: black; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border:none; }
        .btn-admin-gate { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-right: 10px; }

        section { display: none; padding: 120px 8% 60px; animation: fadeIn 0.5s ease; }
        section.active { display: block; }

        .form-container { background: var(--card-bg); max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--accent-gold); color: white; border-radius: 8px; }
        .submit-btn { background: var(--accent-gold); color: black; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; }

        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--main-bg); padding: 30px; border-radius: 15px; width: 400px; border: 2px solid var(--accent-gold); text-align: center; }
        
        .news-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-right: 5px solid var(--accent-gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="cursor-follower" id="cursor"></div>

    <nav>
        <img id="mainLogo" src="https://cdn.discordapp.com/icons/1487961080310272000/abda591d3aadba01fa995d6a33948253.webp?size=1024" class="logo-img" onclick="showSection('home')">
        <ul>
            <li><a href="#" onclick="showSection('home')">الرئيسية</a></li>
            <li><a href="#" onclick="showSection('rules')">القوانين</a></li>
            <li><a href="#" onclick="showSection('apply')">التقديمات</a></li>
            <li><a href="#" onclick="showSection('news')">الأخبار</a></li>
            <li><a href="#" onclick="showSection('store')">المتجر</a></li>
        </ul>
        <div class="nav-right">
            <button class="btn-admin-gate" onclick="openDashMenu()">لوحات الإدارة</button>
            <button class="btn-auth" id="userBtn" onclick="openAuthModal()">تسجيل الدخول</button>
        </div>
    </nav>

    <section id="home" class="active">
        <div style="text-align: center;">
            <p id="topMsg" style="font-size: 1.2rem; color: #8892b0;">مرحباً بك في عالم الواقعية</p>
            <h1 style="font-size: 4.5rem; font-weight: 900;">IDEAL <span style="color:var(--accent-gold)">TOWN</span></h1>
            <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px;">
                <button class="btn-auth" id="discLinkBtn">ديسكورد السيرفر</button>
                <button class="btn-auth" id="fiveLinkBtn">دخول السيرفر</button>
            </div>
        </div>
    </section>

    <section id="news">
        <h1 style="text-align: center; color: var(--accent-gold); margin-bottom: 30px;">روم الأخبار والنتائج</h1>
        <div id="newsList" style="max-width: 800px; margin: 0 auto;"></div>
    </section>

    <section id="apply">
        <div class="form-container">
            <h2 style="color: var(--accent-gold); margin-bottom: 20px;">مركز التقديمات</h2>
            <select id="applyType" onchange="handleApplyType()">
                <option value="">اختر القسم...</option>
                <option value="police">تقديم شرطة</option>
                <option value="ems">تقديم إسعاف</option>
                <option value="admin">تقديم إدارة</option>
                <option value="social">تقديم سوشيال ميديا</option>
            </select>
            <div id="formFields" style="display:none; margin-top:20px;">
                <label>الاسم (تلقائي):</label>
                <input type="text" id="autoName" readonly>
                <textarea id="appDetails" rows="4" placeholder="اكتب خبراتك هنا..."></textarea>
                <button class="submit-btn" onclick="sendApp()">إرسال الطلب</button>
            </div>
        </div>
    </section>

    <section id="dash_top">
        <h1 style="border-bottom: 2px solid var(--accent-gold); padding-bottom: 10px;">لوحة التحكم العليا</h1>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
            <div class="form-container" style="margin:0;">
                <h3>إعدادات الموقع</h3>
                <input type="text" id="editTopMsg" placeholder="كلمة الصفحة الرئيسية">
                <input type="text" id="editDisc" placeholder="رابط الديسكورد">
                <input type="text" id="editFive" placeholder="رابط فايف ام">
                <button class="submit-btn" onclick="saveGlobal()">حفظ التعديلات</button>
            </div>
            <div class="form-container" style="margin:0;">
                <h3>الطلبات الواردة</h3>
                <div id="adminAppList" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </section>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="authTitle">تسجيل الدخول</h2>
            <div id="loginGroup">
                <input type="text" id="lUser" placeholder="اسم المستخدم">
                <input type="password" id="lPass" placeholder="كلمة المرور">
                <button class="submit-btn" onclick="processLogin()">دخول</button>
                <p onclick="toggleAuth(false)" style="margin-top:15px; cursor:pointer; font-size:0.8rem;">ليس لديك حساب؟ إنشاء حساب</p>
            </div>
            <div id="regGroup" style="display:none;">
                <input type="text" id="rReal" placeholder="الاسم الحقيقي">
                <input type="text" id="rRP" placeholder="الاسم في الرول بلاي">
                <input type="password" id="rPass" placeholder="كلمة المرور">
                <button class="submit-btn" onclick="processReg()">إنشاء وحفظ</button>
                <p onclick="toggleAuth(true)" style="margin-top:15px; cursor:pointer; font-size:0.8rem;">لديك حساب؟ سجل دخول</p>
            </div>
            <button onclick="closeModals()" style="background:none; border:none; color:grey; margin-top:10px; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <div id="dashModal" class="modal">
        <div class="modal-content">
            <h3>اختر اللوحة</h3><br>
            <button class="submit-btn" style="margin-bottom:10px;" onclick="checkGate('Management')">الإدارة العليا (تحكم كامل)</button>
            <button class="submit-btn" style="margin-bottom:10px;" onclick="checkGate('Police')">لوحة الشرطة</button>
            <button onclick="closeModals()" style="background:none; border:none; color:grey; cursor:pointer;">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDDIjZKeWikH2-vphDO9OaxZ6rfT0jbk4E",
            databaseURL: "https://ideal124-default-rtdb.firebaseio.com",
            projectId: "ideal124",
            appId: "1:114614295641:web:37ec1565a97a238b102548"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let user = JSON.parse(localStorage.getItem('ideal_user'));

        // حركة الماوس
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // نظام الحسابات
        window.toggleAuth = (isLogin) => {
            document.getElementById('loginGroup').style.display = isLogin ? 'block' : 'none';
            document.getElementById('regGroup').style.display = isLogin ? 'none' : 'block';
            document.getElementById('authTitle').innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
        };

        window.processReg = () => {
            const real = document.getElementById('rReal').value;
            const rp = document.getElementById('rRP').value;
            const pass = document.getElementById('rPass').value;
            if(!real || !rp || !pass) return alert("املأ الخانات!");
            const data = { real, rp, pass };
            set(ref(db, 'users/' + rp), data);
            localStorage.setItem('ideal_user', JSON.stringify(data));
            location.reload();
        };

        window.processLogin = () => {
            const u = document.getElementById('lUser').value;
            const p = document.getElementById('lPass').value;
            onValue(ref(db, 'users/' + u), (s) => {
                if(s.exists() && s.val().pass === p) {
                    localStorage.setItem('ideal_user', JSON.stringify(s.val()));
                    location.reload();
                } else { alert("بيانات خاطئة!"); }
            }, {onlyOnce: true});
        };

        // نظام التقديمات
        window.handleApplyType = () => {
            if(!user) return alert("سجل دخول أولاً!");
            const type = document.getElementById('applyType').value;
            document.getElementById('formFields').style.display = 'block';
            document.getElementById('autoName').value = (type === 'admin' || type === 'social') ? user.real : user.rp;
        };

        window.sendApp = () => {
            const type = document.getElementById('applyType').value;
            const data = { name: document.getElementById('autoName').value, info: document.getElementById('appDetails').value, type, status: 'pending' };
            push(ref(db, 'apps'), data);
            alert("تم الإرسال!");
            showSection('home');
        };

        // الإدارة العليا
        window.saveGlobal = () => {
            update(ref(db, 'settings'), {
                msg: document.getElementById('editTopMsg').value,
                disc: document.getElementById('editDisc').value,
                five: document.getElementById('editFive').value
            });
            alert("تم الحفظ!");
        };

        onValue(ref(db, 'settings'), (s) => {
            const v = s.val() || {};
            document.getElementById('topMsg').innerText = v.msg || "مرحباً بك";
            document.getElementById('discLinkBtn').onclick = () => window.open(v.disc);
            document.getElementById('fiveLinkBtn').onclick = () => window.open(v.five);
        });

        onValue(ref(db, 'apps'), (s) => {
            const list = document.getElementById('adminAppList');
            list.innerHTML = "";
            s.forEach(c => {
                const a = c.val();
                list.innerHTML += `<div class="news-card">
                    <p>${a.name} (${a.type})</p>
                    <button class="btn-auth" onclick="actionApp('${c.key}', 'مقبول', '${a.name}')">قبول</button>
                    <button class="btn-auth" style="background:red;" onclick="actionApp('${c.key}', 'مرفوض', '${a.name}')">رفض</button>
                </div>`;
            });
        });

        window.actionApp = (id, status, name) => {
            push(ref(db, 'news'), { text: `تم ${status} طلب: ${name}`, color: status === 'مقبول' ? '#00ff00' : '#ff0000' });
            remove(ref(db, 'apps/' + id));
        };

        onValue(ref(db, 'news'), (s) => {
            const nList = document.getElementById('newsList');
            nList.innerHTML = "";
            s.forEach(c => {
                const n = c.val();
                nList.innerHTML += `<div class="news-card" style="border-right-color:${n.color}">${n.text}</div>`;
            });
        });

        // وظائف عامة
        window.showSection = (id) => {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.openAuthModal = () => document.getElementById('authModal').style.display = 'flex';
        window.openDashMenu = () => document.getElementById('dashModal').style.display = 'flex';
        window.closeModals = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        window.checkGate = (g) => { 
            const p = prompt("كود دخول " + g); 
            if(p === "123") { closeModals(); showSection('dash_top'); }
        };

        if(user) document.getElementById('userBtn').innerText = user.rp;
    </script>
</body>
</html>
