<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | الموقع الرسمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS - التصميم المتكامل */
        :root {
            --bg: #0a192f;
            --nav: #001f3f;
            --accent: #007bff;
            --white: #ffffff;
            --glow: rgba(0, 123, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--white); overflow-x: hidden; cursor: none; }

        /* تأثير الماوس اللحاقي */
        .cursor-follower {
            position: fixed; width: 25px; height: 25px; background: rgba(255, 255, 255, 0.4);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 20px 10px white; transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
        }

        /* البار العلوي */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: var(--nav); border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed; right: -280px; top: 0; width: 260px; height: 100%;
            background: var(--nav); border-left: 2px solid var(--accent);
            transition: 0.4s; padding: 20px; z-index: 1500;
        }
        .sidebar.active { right: 0; }
        .sidebar h3 { margin-bottom: 20px; text-align: center; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        .sidebar button { width: 100%; margin: 10px 0; text-align: right; background: none; border: none; color: white; cursor: pointer; font-size: 1.1rem; }

        /* القسم الرئيسي */
        .hero { text-align: center; padding: 100px 20px; }
        .main-title { font-size: 4rem; font-weight: 900; }
        .blue-text { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 85%; margin: 50px auto; }
        .stat-card { background: rgba(0, 31, 63, 0.6); padding: 30px; border-radius: 15px; border: 1px solid var(--accent); text-align: center; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-10px); box-shadow: 0 0 20px var(--glow); }

        /* النوافذ المنبثقة (Modals) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--nav); padding: 30px; border-radius: 20px; border: 2px solid var(--accent); width: 100%; max-width: 500px; position: relative; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #0a192f; color: white; border: 1px solid var(--accent); border-radius: 8px; outline: none; }
        .btn-action { background: var(--nav); color: white; border: 1px solid var(--accent); padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>

    <div class="cursor-follower" id="cursor"></div>

    <nav>
        <div class="nav-right"><button class="btn-action" onclick="toggleSidebar()">☰ القائمة</button></div>
        <ul class="nav-links">
            <li><a href="#" onclick="showHome()">القائمة الرئيسية</a></li>
            <li><a href="#" onclick="openPoliceSection()">قسم الشرطة</a></li>
            <li><a href="#">القوانين</a></li>
            <li><a href="#">المتجر</a></li>
            <li><a href="#" onclick="openApplyCenter()">مركز التقديمات</a></li>
            <li><a href="#">الأخبار</a></li>
        </ul>
        <div class="nav-left">
            <button class="btn-action" style="margin-left: 10px;" onclick="gate('Managidl')">الإدارة العليا</button>
            <button class="btn-action" id="loginBtn" onclick="login()">تسجيل دخول</button>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <h3>الداش بوردات</h3>
        <button onclick="gate('PoliceIdel')">داش بورد الشرطة</button>
        <button onclick="gate('Adminidl')">الإدارة العامة</button>
        <button onclick="gate('medidel')">داش بورد الإسعاف</button>
        <button onclick="gate('Lawidl')">داش بورد العدل</button>
        <button onclick="gate('socialidel')">السوشل ميديا</button>
        <button onclick="toggleSidebar()" style="color: red; margin-top: 20px;">إغلاق ×</button>
    </div>

    <main id="content">
        <section class="hero">
            <h1 class="main-title">IDEAL <span class="blue-text">TOWN</span></h1>
            <p>مرحباً بك في السيرفر الأفضل والأجمل استمتع في تجربتك</p>
            
            <div class="stats-grid">
                <div class="stat-card"><p>الأعضاء المسجلين</p><h2 id="regUsers">0</h2></div>
                <div class="stat-card"><p>المتواجدون حالياً</p><h2 id="onlineNow">0</h2></div>
                <div class="stat-card"><p>السكربتات الحصرية</p><h2 id="scriptCount">0</h2></div>
                <div class="stat-card"><p>حالة السيرفر</p><h2 id="serverStatus">تحميل...</h2></div>
            </div>

            <div style="display:flex; justify-content:center; gap:20px; margin-top: 30px;">
                <button class="btn-action" id="joinDiscord">دخول الديسكورد</button>
                <button class="btn-action" id="joinFivem">دخول السيرفر</button>
            </div>
        </section>
    </main>

    <!-- نافذة تسجيل الدخول للأكواد -->
    <div class="modal" id="gateModal">
        <div class="modal-content">
            <h2 id="gateTitle">دخول الإدارة</h2>
            <input type="text" id="gUser" placeholder="الاسم الشخصي">
            <input type="password" id="gPass" placeholder="كود الدخول">
            <button class="btn-action" style="width: 100%;" onclick="verifyGate()">دخول</button>
            <button class="btn-action" style="width: 100%; margin-top: 10px; border-color: red;" onclick="closeModal()">إلغاء</button>
        </div>
    </div>

    <!-- نافذة التقديمات -->
    <div class="modal" id="applyModal">
        <div class="modal-content">
            <h2>مركز التقديمات</h2>
            <div id="applyOptions">
                <button class="btn-action" style="width: 100%; margin: 5px 0;" onclick="openForm('police')">تقديم شرطة</button>
                <button class="btn-action" style="width: 100%; margin: 5px 0;" onclick="openForm('admin')">تقديم إدارة</button>
                <button class="btn-action" style="width: 100%; margin: 5px 0;" onclick="openForm('ems')">تقديم إسعاف</button>
                <button onclick="closeModal()" style="color: grey; background: none; border: none; cursor: pointer; margin-top: 10px;">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- نموذج التقديم الفعلي -->
    <div class="modal" id="formModal">
        <div class="modal-content">
            <h2 id="formHeader">تقديم جديد</h2>
            <form id="realForm">
                <input type="text" id="fDiscord" readonly>
                <input type="text" id="fName" placeholder="الاسم في السيرفر" required>
                <input type="number" id="fAge" placeholder="العمر الحقيقي" required>
                <input type="text" id="fExp" placeholder="الخبرة السابقة" required>
                <select id="fPast"><option value="نعم">هل كنت من قبل؟ نعم</option><option value="لا">لا</option></select>
                <button type="submit" class="btn-action" style="width: 100%;">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        // إعدادات الفايربيس
        const firebaseConfig = {
            apiKey: "AIzaSyDDIjZKeWikH2-vphDO9OaxZ6rfT0jbk4E",
            databaseURL: "https://ideal124-default-rtdb.firebaseio.com",
            projectId: "ideal124",
            appId: "1:114614295641:web:37ec1565a97a238b102548"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // نظام الأكواد السرية
        const codes = {
            "PoliceIdel": "863926881P",
            "medidel": "8258261994M",
            "socialidel": "2826815747S",
            "Lawidl": "8257168915791L",
            "Adminidl": "90716893519Ad",
            "Managidl": "0868185846728Ad"
        };

        let target = "";
        const cursor = document.getElementById('cursor');

        // حركة الماوس
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // جلب الإعدادات المباشرة من الفايربيس
        onValue(ref(db, 'settings'), (snap) => {
            const val = snap.val() || {};
            document.getElementById('serverStatus').innerText = val.status || "متصل";
            document.getElementById('scriptCount').innerText = val.scripts || "0";
            document.getElementById('joinDiscord').onclick = () => window.open(val.discordLink);
            document.getElementById('joinFivem').onclick = () => window.open(val.fivemLink);
        });

        // وظائف الداش بورد
        window.gate = (t) => { target = t; document.getElementById('gateModal').style.display = 'flex'; };
        window.verifyGate = () => {
            const u = document.getElementById('gUser').value;
            const p = document.getElementById('gPass').value;
            if(codes[u] === p) { alert("مرحباً بك في " + u); closeModal(); } else { alert("بيانات خاطئة!"); }
        };

        // التقديمات
        window.openApplyCenter = () => document.getElementById('applyModal').style.display = 'flex';
        window.openForm = (type) => {
            const user = localStorage.getItem('dUser') || "GUEST_123"; 
            document.getElementById('applyModal').style.display = 'none';
            document.getElementById('formModal').style.display = 'flex';
            document.getElementById('fDiscord').value = user;
            document.getElementById('realForm').onsubmit = (e) => {
                e.preventDefault();
                push(ref(db, 'apps/' + type), {
                    user: user,
                    name: document.getElementById('fName').value,
                    age: document.getElementById('fAge').value,
                    status: "pending"
                });
                alert("تم إرسال الطلب بنجاح!"); closeModal();
            };
        };

        // --- نظام تسجيل الدخول بـ Discord المدمج من الكود الأول ---
        window.login = () => {
            const clientID = "1499794926529937479"; 
            const redirect = encodeURIComponent("https://kinanashrf999-code.github.io/My-web/");
            window.location.href = `https://discord.com/oauth2/authorize?client_id=${clientID}&response_type=code&redirect_uri=${redirect}&scope=identify+email`;
        };

        // معالجة العودة من الديسكورد وحفظ البيانات
        window.onload = () => {
            const fragment = new URLSearchParams(window.location.search);
            if (fragment.has("code")) {
                // هنا يتم حفظ يوزر وهمي للتجربة أو المتابعة البرمجية كما في الكود الأول
                localStorage.setItem('dUser', "المستخدم_المسجل"); 
                document.getElementById('loginBtn').innerText = "تم تسجيل الدخول";
            }
        };

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
        window.closeModal = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        window.showHome = () => { window.location.reload(); };
    </script>
</body>
</html>
