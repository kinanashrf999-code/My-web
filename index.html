<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع متوقف حالياً | IDEAL TOWN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #020617;
            --error-red: #ef4444;
            --primary-sky: #0ea5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-deep);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .maintenance-container {
            padding: 40px;
            max-width: 600px;
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .icon-box {
            font-size: 80px;
            color: var(--error-red);
            margin-bottom: 25px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 40px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to left, #fff, var(--error-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="icon-box">
            <i class="fas fa-tools"></i>
        </div>
        <h1>عذراً، الموقع خربان!</h1>
        <p>نواجه حالياً بعض المشاكل التقنية في سيرفرات <b>IDEAL TOWN</b>. جاري العمل على إصلاح العطل من قبل الإدارة الفنية.</p>
        
        <div class="status-badge">
            <i class="fas fa-exclamation-triangle"></i> حالة النظام: صيانة طارئة
        </div>

        <div class="footer-text">
            سوف نعود للعمل فور انتهاء الإصلاحات. شكراً لصبركم.
        </div>
    </div>

</body>
</html>
