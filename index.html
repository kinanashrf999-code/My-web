<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | الموقع الرسمي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --dark-blue: #0a192f; 
            --btn-blue: linear-gradient(135.5deg, rgb(17, 58, 107) 0%, rgb(36, 154, 233) 100%);
            --white: #ffffff; 
            --glass: rgba(255, 255, 255, 0.05); 
            --discord: #5865F2;
            --accent: #349ae9;
            --online: #22c55e;
            --offline: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0d1b2a; color: var(--white); min-height: 100vh; overflow-x: hidden; }
        
        nav { 
            display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; 
            background: rgba(10, 25, 47, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .nav-links a { color: white; text-decoration: none; margin: 0 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .section { display: none; padding: 120px 5% 50px; text-align: center; animation: fadeIn 0.5s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .logo-img { width: 120px; border-radius: 50%; border: 3px solid #1b4965; margin-bottom: 20px; }
        .hero-title { font-size: 3rem; font-weight: 900; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; max-width: 900px; margin: 30px auto; }
        .stat-box { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid #1b4965; }
        .stat-box h3 { color: var(--accent); font-size: 1.6rem; }
        .status-text { font-weight: bold; font-size: 1.4rem; }

        .btn { background: var(--btn-blue); color: white; border: none; padding: 10px 22px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; font-size: 0.95rem; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
        
        /* تعديل مقاسات المتجر لتكون "متوسطة" */
        .store-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); /* تكبير العرض قليلاً */
            gap: 20px; 
            margin-top: 30px; 
            padding: 0 5%; 
        }
        .product-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 18px; 
            overflow: hidden; 
            position: relative; 
            max-width: 320px; /* تكبير الحد الأقصى */
            margin: auto;
            transition: 0.3s ease;
        }
        .product-card:hover { border-color: var(--accent); transform: scale(1.02); }

        .img-container { position: relative; width: 100%; padding-top: 65%; }
        .product-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .price-tag { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            background: var(--btn-blue); 
            color: white; 
            padding: 5px 14px; 
            border-radius: 20px; 
            font-weight: bold; 
            font-size: 0.9rem; 
            z-index: 5; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .product-info { padding: 18px; text-align: right; }
        .product-info h3 { color: var(--accent); margin-bottom: 10px; font-size: 1.25rem; }
        .buy-btn { width: 100%; font-size: 0.95rem; padding: 10px; }

        .card { background: var(--glass); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin: 20px auto; max-width: 900px; text-align: right; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.6); border: 1px solid #1b4965; color: white; border-radius: 8px; text-align: right; }
        
        .admin-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; margin-top: 15px; border-radius: 10px; text-align: right; }
        #login-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://cdn.discordapp.com/icons/1487961080310272000/abda591d3aadba01fa995d6a33948253.webp?size=1024" width="40" style="border-radius: 50%;">
            <span style="font-weight: 900;">IDEAL TOWN</span>
        </div>
        <div class="nav-links">
            <a onclick="showSection('home')">الرئيسية</a>
            <a onclick="showSection('store')">المتجر</a>
            <a onclick="showSection('laws')">القوانين</a>
            <a onclick="showSection('police')">الشرطة</a>
            <a onclick="showSection('apply-admin')">تقديم الإدارة</a>
            <a href="https://discord.gg/G8Rqej3RGt" target="_blank" style="color: #5865F2;"><i class="fab fa-discord"></i> الديسكورد</a>
        </div>
        <button class="btn" onclick="document.getElementById('login-modal').style.display='flex'" style="padding: 5px 15px; font-size: 0.8rem;">لوحة الإدارة</button>
    </nav>

    <div id="login-modal">
        <div class="card" style="width: 350px; text-align: center;">
            <h3>تسجيل دخول الإدارة</h3>
            <input type="text" id="user-input" placeholder="اسم المستخدم">
            <input type="password" id="pass-input" placeholder="الرمز">
            <button class="btn" onclick="handleLogin()" style="width: 100%;">دخول</button>
            <button class="btn" onclick="document.getElementById('login-modal').style.display='none'" style="background:none; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <div id="home" class="section active">
        <img src="https://cdn.discordapp.com/icons/1487961080310272000/abda591d3aadba01fa995d6a33948253.webp?size=1024" class="logo-img">
        <h1 class="hero-title">IDEAL TOWN</h1>
        <div class="stats-grid">
            <div class="stat-box"><h3 id="display-online">0</h3><p>اللاعبين الآن</p></div>
            <div class="stat-box"><h3 id="display-total">0</h3><p>لاعب مسجل</p></div>
            <div class="stat-box"><p>حالة السيرفر</p><div id="display-status" class="status-text">جاري التحميل...</div></div>
        </div>
    </div>

    <div id="store" class="section">
        <h1>متجر المدينة</h1>
        <div id="store-container" class="store-grid"></div>
    </div>

    <div id="admin-panel" class="section">
        <h1 style="color: var(--accent);">لوحة الإدارة العليا</h1>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;">
            <div class="card" style="margin:0">
                <h3>حالة السيرفر والعدادات</h3>
                <select id="edit-status"><option value="متصل">متصل ✅</option><option value="غير متصل">غير متصل ❌</option></select>
                <input type="number" id="edit-online" placeholder="عدد اللاعبين الآن">
                <input type="text" id="edit-total" placeholder="إجمالي اللاعبين">
                <button class="btn" onclick="updateStats()" style="width: 100%;">تحديث البيانات</button>
            </div>
            <div class="card" style="margin:0">
                <h3>إضافة منتج</h3>
                <input type="text" id="prod-img" placeholder="رابط الصورة">
                <input type="text" id="prod-title" placeholder="اسم المنتج">
                <input type="text" id="prod-price" placeholder="السعر">
                <button class="btn" onclick="addNewProduct()" style="width: 100%;">نشر</button>
            </div>
            <div class="card" style="margin:0"><h3>طلبات الشراء</h3><div id="order-requests"></div></div>
            <div class="card" style="margin:0"><h3>طلبات التوظيف</h3><div id="all-apps"></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCej9aIee1xn8TsHzrBR7IEbHL7uI-xJ6k",
            authDomain: "ideal-town.firebaseapp.com",
            databaseURL: "https://ideal-town-default-rtdb.firebaseio.com",
            projectId: "ideal-town",
            storageBucket: "ideal-town.firebasestorage.app",
            messagingSenderId: "505860972539",
            appId: "1:505860972539:web:30e3455476674bd45eb55e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function handleLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            if(user === "IDL TOWN MANAGEMENT" && pass === "663567M") { 
                document.getElementById('login-modal').style.display = 'none';
                showSection('admin-panel'); 
            } else { alert("خطأ!"); }
        }

        function updateStats() {
            const online = document.getElementById('edit-online').value;
            const total = document.getElementById('edit-total').value;
            const status = document.getElementById('edit-status').value;
            if(online) db.ref('site_stats/online').set(online);
            if(total) db.ref('site_stats/total').set(total);
            db.ref('site_stats/status').set(status);
            alert("تم التحديث!");
        }

        db.ref('site_stats').on('value', (s) => {
            const data = s.val();
            if(data) {
                document.getElementById('display-online').innerText = data.online || 0;
                document.getElementById('display-total').innerText = data.total || 0;
                const statusBox = document.getElementById('display-status');
                statusBox.innerText = data.status || "غير معروف";
                statusBox.style.color = (data.status === "متصل") ? "var(--online)" : "var(--offline)";
            }
        });

        function addNewProduct() {
            const img = document.getElementById('prod-img').value;
            const title = document.getElementById('prod-title').value;
            const price = document.getElementById('prod-price').value;
            if(title && price) db.ref('store_products').push({ img, title, price });
        }

        db.ref('store_products').on('value', (s) => {
            const data = s.val(); const div = document.getElementById('store-container'); div.innerHTML = "";
            for(let id in data) {
                const p = data[id];
                div.innerHTML += `
                    <div class="product-card">
                        <div class="img-container">
                            <div class="price-tag">${p.price}</div>
                            <img src="${p.img || 'https://via.placeholder.com/400x260'}" class="product-img">
                        </div>
                        <div class="product-info">
                            <h3>${p.title}</h3>
                            <button class="btn buy-btn" onclick="buyProduct('${p.title}')">طلب شراء</button>
                        </div>
                    </div>`;
            }
        });

        function buyProduct(name) {
            const dc = prompt("يوزر الديسكورد:");
            if(dc) db.ref('store_orders').push({ product: name, user: dc, date: new Date().toLocaleString() });
        }

        db.ref('all_apps').on('value', (s) => {
            const data = s.val(); const div = document.getElementById('all-apps'); div.innerHTML = "";
            for(let id in data) {
                const a = data[id];
                div.innerHTML += `<div class="admin-card"><b>${a.name}</b><br>
                <button class="btn" style="background:#ef4444; padding: 5px 10px;" onclick="db.ref('all_apps/${id}').remove()">حذف</button></div>`;
            }
        });

        db.ref('store_orders').on('value', (s) => {
            const data = s.val(); const div = document.getElementById('order-requests'); div.innerHTML = "";
            for(let id in data) {
                const o = data[id];
                div.innerHTML += `<div class="admin-card">📦 ${o.product}<br>👤 ${o.user}<br>
                <button class="btn" style="width:100%; margin-top:5px; background:#1e293b;" onclick="db.ref('store_orders/${id}').remove()">حذف</button></div>`;
            }
        });
    </script>
</body>
</html>
