<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDEAL TOWN | FiveM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #ffcc00; --blue: #0a192f; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: radial-gradient(circle at top right, #112240, #0a192f); color: var(--white); min-height: 100vh; overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: var(--glass); backdrop-filter: blur(10px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 215, 0, 0.2); }
        .section { display: none; padding: 120px 8% 50px; min-height: 100vh; text-align: center; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-card { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); flex: 1; min-width: 150px; }
        .stat-card h3 { color: var(--gold); font-size: 2.5rem; }
        .btn { background: var(--gold); color: black; border: none; padding: 12px 25px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: white; border-radius: 8px; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem; color: var(--gold);">IDEAL TOWN</div>
        <div style="display: flex; gap: 20px;">
            <a onclick="showSection('home')" style="cursor:pointer; font-weight:bold;">الرئيسية</a>
            <a onclick="showSection('apply')" style="cursor:pointer; font-weight:bold;">التقديم</a>
        </div>
        <button class="btn" onclick="adminLogin()">لوحة الإدارة</button>
    </nav>

    <div id="home" class="section active">
        <h1 style="font-size: 3.5rem; font-weight: 900; margin-top: 50px;">IDEAL TOWN</h1>
        <p style="color: #ccc; margin-bottom: 40px;">سيرفر الحياة الواقعية الأفضل</p>
        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; max-width: 800px; margin: auto;">
            <div class="stat-card"><h3 id="live-online">0</h3><p>لاعب متصل</p></div>
            <div class="stat-card"><h3 id="live-reg">0</h3><p>عضو مسجل</p></div>
        </div>
    </div>

    <div id="apply" class="section">
        <div style="max-width: 500px; margin: auto; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
            <h2 style="color: var(--gold); margin-bottom: 20px;">طلب انضمام</h2>
            <form id="applyForm">
                <input type="text" id="p-name" placeholder="الاسم الكامل" required>
                <input type="text" id="p-dc" placeholder="يوزر الديسكورد" required>
                <button type="submit" class="btn" style="width: 100%; margin-top: 15px;">إرسال الطلب</button>
            </form>
        </div>
    </div>

    <div id="admin" class="section">
        <h2 style="color: var(--gold); margin-bottom: 30px;">لوحة التحكم</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 900px; margin: auto;">
            <div style="background: var(--glass); padding: 20px; border-radius: 15px;">
                <h3>تحديث الإحصائيات</h3>
                <input type="number" id="new-online" placeholder="المتصلين الآن">
                <input type="number" id="new-reg" placeholder="إجمالي المسجلين">
                <button class="btn" onclick="updateStats()" style="width:100%;">تحديث الموقع</button>
            </div>
            <div id="list-apps" style="background: var(--glass); padding: 20px; border-radius: 15px; text-align: right; max-height: 400px; overflow-y: auto;">
                <h3>الطلبات الجديدة:</h3>
            </div>
        </div>
    </div>

    <script>
        // إعداداتك الخاصة يا كنان
        const firebaseConfig = {
            apiKey: "AIzaSyCej9aIee1xn8TsHzrBR7IEbHL7uI-xJ6k",
            authDomain: "ideal-town.firebaseapp.com",
            databaseURL: "https://ideal-town-default-rtdb.firebaseio.com",
            projectId: "ideal-town",
            storageBucket: "ideal-town.firebasestorage.app",
            messagingSenderId: "505860972539",
            appId: "1:505860972539:web:30e3455476674bd45eb55e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function adminLogin() {
            let p = prompt("كود الإدارة:");
            if(p === "6635764M") showSection('admin');
            else alert("خطأ!");
        }

        // جلب البيانات فوراً وتحديثها لو تغيرت في قوقل
        db.ref('server_stats').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('live-online').innerText = data.online || 0;
                document.getElementById('live-reg').innerText = data.reg || 0;
            }
        });

        function updateStats() {
            db.ref('server_stats').set({
                online: document.getElementById('new-online').value,
                reg: document.getElementById('new-reg').value
            }).then(() => alert("تم التحديث بنجاح!"));
        }

        document.getElementById('applyForm').onsubmit = function(e) {
            e.preventDefault();
            db.ref('apps').push({
                name: document.getElementById('p-name').value,
                discord: document.getElementById('p-dc').value
            }).then(() => { alert("تم الإرسال!"); this.reset(); });
        };

        db.ref('apps').on('value', (snap) => {
            const apps = snap.val();
            const box = document.getElementById('list-apps');
            box.innerHTML = "<h3>الطلبات الجديدة:</h3>";
            for(let key in apps) {
                box.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; margin-top:10px; border-radius:10px; border-right:4px solid var(--gold);">
                    <p><b>الاسم:</b> ${apps[key].name}</p>
                    <p><b>ديسكورد:</b> ${apps[key].discord}</p>
                    <button onclick="db.ref('apps/${key}').remove()" style="color:red; background:none; border:none; cursor:pointer; font-size:12px;">حذف</button>
                </div>`;
            }
        });
    </script>
</body>
</html>
